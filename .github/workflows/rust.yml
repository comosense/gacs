name: Rust Nightly Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] # v0.6.0 などのタグにマッチ
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read # CodeQLのwarning対策。ソースコードの取得のみなのでreadで十分です
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin: gacs.exe
            out_name: gacs-x86_64-pc-windows-msvc.exe # 拡張子を維持
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin: gacs
            out_name: gacs-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            bin: gacs
            out_name: gacs-aarch64-unknown-linux-musl

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install Rust Nightly
      uses: dtolnay/rust-toolchain@nightly
      with:
        toolchain: nightly
        targets: ${{ matrix.target }}
        components: rust-src

    - name: Install Linux Cross-Compiler (Aarch64 Musl)
      if: matrix.target == 'aarch64-unknown-linux-musl'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
        echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

    - name: Cargo Cache
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Run Build-Std
      run: |
        cargo build -Z build-std=std,panic_abort -Z build-std-features="optimize_for_size" --release --target ${{ matrix.target }}

    - name: Prepare Artifact
      shell: bash
      run: |
        cd target/${{ matrix.target }}/release/
        mv ${{ matrix.bin }} ../../../${{ matrix.out_name }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: binary-${{ matrix.target }}
        path: ${{ matrix.out_name }}

  release:
    name: Create GitHub Release
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write # リリース作成とアセットのアップロードに必要

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        pattern: binary-*
        merge-multiple: true

    - name: Release to GitHub
      uses: softprops/action-gh-release@v3
      with:
        files: |
          gacs-x86_64-pc-windows-msvc.exe
          gacs-x86_64-unknown-linux-gnu
          gacs-aarch64-unknown-linux-musl
        generate_release_notes: true
