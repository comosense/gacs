name: Rust Nightly Release

on:
  push:
    branches: [ "main" ]
    tags: [ "[0-9]*" ] # 0.1.0 や 1.0.0 などの数字始まりのタグプッシュで起動
  pull_request:
    branches: [ "main" ]

jobs:
  # -------------------------------------------------------------
  # 1. ビルドジョブ (CI & リリース用バイナリ生成)
  # -------------------------------------------------------------
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin: gacs.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin: gacs
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            bin: gacs

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust Nightly
      uses: dtolnay/rust-toolchain@nightly
      with:
        toolchain: nightly
        targets: ${{ matrix.target }}
        components: rust-src

    - name: Install Linux Cross-Compiler (Aarch64 Musl)
      if: matrix.target == 'aarch64-unknown-linux-musl'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
        echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

    - name: Cargo Cache
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Run Build-Std
      run: |
        cargo build -Z build-std=std,panic_abort -Z build-std-features="optimize_for_size" --release --target ${{ matrix.target }}

    - name: Prepare Artifact
      shell: bash
      run: |
        cd target/${{ matrix.target }}/release/
        mv ${{ matrix.bin }} ../../../${{ matrix.bin }}-${{ matrix.target }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binary-${{ matrix.target }}
        path: ${{ matrix.bin }}-${{ matrix.target }}

  # -------------------------------------------------------------
  # 2. リリース公開ジョブ (タグプッシュ時のみ実行)
  # -------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: build
    # トリガーがタグプッシュ（github.ref_type == 'tag'）の場合のみ実行
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: binary-*
        merge-multiple: true

    - name: Release to GitHub
      uses: softprops/action-gh-release@v2
      with:
        files: |
          gacs.exe-x86_64-pc-windows-msvc
          gacs-x86_64-unknown-linux-gnu
          gacs-aarch64-unknown-linux-musl
        generate_release_notes: true
